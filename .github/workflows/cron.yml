name: Scheduled Cron Trigger

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Cron Endpoint
        run: |
          echo "Triggering cron endpoint at $(date)"
          response=$(curl -f -s -w "\n%{http_code}" https://zyra.vercel.app/api/cron)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response Body: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Cron endpoint triggered successfully"
            exit 0
          else
            echo "❌ Cron endpoint failed with status $http_code"
            exit 1
          fi
